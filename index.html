<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">

    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #f8fafc;
            overflow: hidden;
            height: 100vh;
            margin: 0;
            padding: 0;
        }
        
        /* 玻璃卡片效果 */
        .glass-card { 
            background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.2); 
        }
        
        /* 渐变背景 */
        .trend-gradient { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
        }
        
        /* 悬停效果 */
        .hover-lift:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04); 
        }
        
        /* 自定义滚动条 */
        .custom-scroll::-webkit-scrollbar { 
            width: 6px; 
            height: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track { 
            background: #f1f1f1; 
            border-radius: 10px; 
        }
        .custom-scroll::-webkit-scrollbar-thumb { 
            background: #cbd5e0; 
            border-radius: 10px; 
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover { 
            background: #94a3b8; 
        }
        
        /* 消息项悬停 */
        .message-item:hover { 
            background-color: #f9fafb; 
        }
        
        /* 激活导航 */
        .active-nav { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white !important; 
        }
        
        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-fadeIn { 
            animation: fadeIn 0.2s ease-out; 
        }
        
        /* 弹窗遮罩 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);

            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;

        }

            overflow-x: auto;

            margin: 0 -16px;
            padding: 0 16px;
        }
        
        .table-responsive table {
            min-width: 500px;
        }
        
        /* 移动端底部导航激活状态 */
        .mobile-nav-active {
            color: #7c3aed;
        }
        
        .mobile-nav-active i {
            color: #7c3aed;
        }
        
        /* 移动端卡片间距优化 */
        @media (max-width: 640px) {
            .grid {
                gap: 12px;
            }
            
            .p-8 {
                padding: 16px;
            }
            
            .p-6 {
                padding: 16px;
            }
            
            .text-3xl {
                font-size: 1.5rem;
            }
            
            .text-2xl {
                font-size: 1.25rem;
            }
            
            .space-x-4 > :not([hidden]) ~ :not([hidden]) {
                margin-left: 0.5rem;
            }
            
            /* 趋势卡片调整 */
            .trend-gradient {
                padding: 20px;
            }
            
            /* 通知面板全屏 */
            #notification-panel {
                position: fixed !important;
                top: 0 !important;
                right: 0 !important;
                bottom: 0 !important;
                left: 0 !important;
                width: 100% !important;
                max-width: 100% !important;
                border-radius: 0 !important;
                margin: 0 !important;
                z-index: 100 !important;
            }
            
            /* 弹窗适配 */
            .modal-overlay .bg-white {
                max-height: 80vh;
                overflow-y: auto;
            }
            
            /* 竞品卡片网格 */
            .competitor-grid {
                grid-template-columns: 1fr !important;
            }
        }
        
        /* 触摸优化 */
        button, 
        a, 
        .nav-item, 
        .message-item,
        [onclick] {
            cursor: pointer;
            -webkit-tap-highlight-color: rgba(124, 58, 237, 0.1);
        }
        
        /* 防止双击缩放 */
        button, 
        a {
            touch-action: manipulation;
        }
        
        /* 移动端搜索面板 */
        .mobile-search-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            z-index: 200;
            padding: 16px;
        }
        
        /* 安全区域适配 */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .mobile-nav-bar {
                padding-bottom: env(safe-area-inset-bottom);
            }
        }
        
        /* 加载动画 */
        .thinking-dots div {
            width: 8px;
            height: 8px;
            background: #7c3aed;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.4s infinite ease-in-out both;
        }
        
        .thinking-dots div:nth-child(1) { animation-delay: -0.32s; }
        .thinking-dots div:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        /* 下拉刷新提示 */
        .pull-to-refresh {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #7c3aed;
            color: white;
            text-align: center;
            padding: 8px;
            font-size: 12px;
            transform: translateY(-100%);
            transition: transform 0.2s;
            z-index: 300;
        }
        
        .pull-to-refresh.show {
            transform: translateY(0);
        }
        
        /* 横屏提示 */
        .landscape-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #f59e0b;
            color: white;
            text-align: center;
            padding: 8px;
            font-size: 12px;
            z-index: 400;
        }
        
        @media (orientation: landscape) and (max-height: 500px) {
            .landscape-warning {
                display: block;
            }
        }
    </style>
</head>

        }, { passive: true });

            if (window.scrollY === 0 && e.touches[0].clientY - touchStartY > 100 && !isRefreshing) {

            }
        }, { passive: true });

                    <main class="flex-1 overflow-y-auto px-4 md:px-8 pt-4 md:pt-8 pb-20 md:pb-8 custom-scroll">
                        <h2 class="text-lg md:text-2xl font-bold text-gray-900 mb-4 md:mb-6">📊 竞品追踪</h2>
                        
                        <!-- 市场份额 -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 md:gap-4 mb-4 md:mb-8 competitor-grid">
                            ${trendPredictions.competitorData.map(c => `
                                <div class="bg-white rounded-xl md:rounded-2xl shadow-lg p-4 ${c.name === '正大食品' ? 'border-2 border-purple-500' : ''}">
                                    <div class="flex justify-between items-start">
                                        <h3 class="text-sm md:text-lg font-semibold text-gray-900">${c.name}</h3>
                                        ${c.name === '正大食品' ? '<span class="px-1.5 py-0.5 bg-purple-100 text-purple-700 rounded-full text-[8px] md:text-xs">本品牌</span>' : ''}
                                    </div>
                                    <div class="mt-2 md:mt-4">
                                        <div class="text-lg md:text-2xl font-bold text-gray-900">${c.share}</div>
                                        <div class="flex items-center mt-1 ${c.yoy.includes('+') ? 'text-green-600' : 'text-red-600'}">
                                            <i class="fas fa-arrow-${c.yoy.includes('+') ? 'up' : 'down'} text-[10px] md:text-xs mr-1"></i>
                                            <span class="text-xs md:text-sm">${c.yoy}</span>
                                        </div>
                                    </div>
                                    <div class="mt-2 md:mt-4 pt-2 md:pt-4 border-t border-gray-100">
                                        <div class="text-[10px] md:text-sm"><span class="text-gray-500">爆品:</span> ${c.hotProduct}</div>
                                        <div class="text-[10px] md:text-sm mt-0.5"><span class="text-gray-500">优势:</span> ${c.strength}</div>
                                        <div class="text-[10px] md:text-sm mt-0.5"><span class="text-gray-500">劣势:</span> ${c.weakness}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <!-- 竞品动向 -->
                        <div class="bg-white rounded-xl md:rounded-2xl shadow-lg p-4 md:p-6">
                            <h3 class="text-sm md:text-lg font-semibold text-gray-900 mb-3 md:mb-4">🎯 最新动向</h3>
                            <div class="space-y-3">
                                <div class="flex items-start space-x-2 md:space-x-3 p-2 md:p-3 bg-gray-50 rounded-lg">
                                    <i class="fas fa-bullhorn text-orange-500 text-xs md:text-sm mt-0.5"></i>
                                    <div>
                                        <span class="text-xs md:text-sm font-semibold text-gray-900">安井食品 · 3月6日</span>
                                        <p class="text-[10px] md:text-sm text-gray-600 mt-1">推出"低脂虾滑"系列，首日销量破万</p>
                                    </div>
                                </div>
                                <div class="flex items-start space-x-2 md:space-x-3 p-2 md:p-3 bg-gray-50 rounded-lg">
                                    <i class="fas fa-chart-line text-blue-500 text-xs md:text-sm mt-0.5"></i>
                                    <div>
                                        <span class="text-xs md:text-sm font-semibold text-gray-900">三全食品 · 3月5日</span>
                                        <p class="text-[10px] md:text-sm text-gray-600 mt-1">"私厨水饺"抖音投放，年轻用户+15%</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                    ${mobileBottomNav}
                </div>
            `;

            // 设置页面
            const settingsPage = `
                <div class="flex-1 flex flex-col h-full bg-gray-50 relative">
                    ${header}
                    ${notificationPanel}
                    ${mobileSearch}
                    ${mobileMenu}
                    <main class="flex-1 overflow-y-auto px-4 md:px-8 pt-4 md:pt-8 pb-20 md:pb-8 custom-scroll">
                        <h2 class="text-lg md:text-2xl font-bold text-gray-900 mb-4 md:mb-6">⚙️ 设置</h2>
                        
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-8">
                            <div class="bg-white rounded-xl md:rounded-2xl shadow-lg p-4 md:p-6">
                                <h3 class="text-sm md:text-lg font-semibold text-gray-900 mb-3 md:mb-4">基础配置</h3>
                                <div class="space-y-3 md:space-y-4">
                                    <div class="flex items-center justify-between">
                                        <span class="text-xs md:text-sm text-gray-700">通知提醒</span>
                                        <label class="relative inline-flex items-center cursor-pointer">
                                            <input type="checkbox" class="sr-only peer" ${trendPredictions.settings.notifications ? 'checked' : ''}>
                                            <div class="w-9 h-5 md:w-11 md:h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-purple-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 md:after:h-5 md:after:w-5 after:transition-all peer-checked:bg-purple-600"></div>
                                        </label>
                                    </div>
                                    <div class="flex items-center justify-between">
                                        <span class="text-xs md:text-sm text-gray-700">自动刷新</span>
                                        <label class="relative inline-flex items-center cursor-pointer">
                                            <input type="checkbox" class="sr-only peer" ${trendPredictions.settings.autoRefresh ? 'checked' : ''}>
                                            <div class="w-9 h-5 md:w-11 md:h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-purple-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 md:after:h-5 md:after:w-5 after:transition-all peer-checked:bg-purple-600"></div>
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <div class="bg-white rounded-xl md:rounded-2xl shadow-lg p-4 md:p-6">
                                <h3 class="text-sm md:text-lg font-semibold text-gray-900 mb-3 md:mb-4">数据源</h3>
                                <div class="space-y-2">
                                    ${trendPredictions.settings.dataSources.map(ds => `
                                        <div class="flex items-center">
                                            <input type="checkbox" class="rounded text-purple-600" checked>
                                            <span class="ml-2 md:ml-3 text-xs md:text-sm text-gray-700">${ds}</span>
                                            <span class="ml-auto text-[8px] md:text-xs text-green-600">● 活跃</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>

                            <div class="bg-white rounded-xl md:rounded-2xl shadow-lg p-4 md:p-6 lg:col-span-2">
                                <h3 class="text-sm md:text-lg font-semibold text-gray-900 mb-3 md:mb-4">AI模型信息</h3>
                                <div class="grid grid-cols-2 gap-3 md:gap-4">
                                    <div>
                                        <span class="text-[10px] md:text-sm text-gray-500">当前版本</span>
                                        <p class="text-xs md:text-lg font-semibold text-gray-900">${trendPredictions.settings.predictionModel}</p>
                                    </div>
                                    <div>
                                        <span class="text-[10px] md:text-sm text-gray-500">最后训练</span>
                                        <p class="text-xs md:text-lg font-semibold text-gray-900">${trendPredictions.settings.lastTraining}</p>
                                    </div>
                                </div>
                                <button class="mt-3 md:mt-4 w-full md:w-auto px-3 py-2 md:px-4 md:py-2 bg-purple-600 text-white rounded-lg md:rounded-xl text-xs md:text-sm hover:bg-purple-700 transition-all" onclick="showRetrainMessage()">
                                    立即重新训练
                                </button>
                            </div>
                        </div>
                    </main>
                    ${mobileBottomNav}
                </div>
            `;

            // 选择页面
            let pageContent = trendOverviewPage;
            if (currentPage === '数据监测') pageContent = dataMonitoringPage;
            if (currentPage === '商业建议') pageContent = businessAdvicePage;
            if (currentPage === '竞品追踪') pageContent = competitorPage;
            if (currentPage === '设置') pageContent = settingsPage;

            // 最终渲染
            root.innerHTML = `
                <div class="flex h-full w-full">
                    ${desktopSidebar}
                    ${pageContent}
                </div>
                ${renderModal()}
            `;

            // 绑定事件
            bindEvents();
        }

        // 绑定事件
        function bindEvents() {
            // 导航点击
            document.querySelectorAll('[data-page]').forEach(item => {
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    changePage(item.dataset.page);
                });
            });

            // 通知按钮
            const notifBtn = document.getElementById('notification-btn');
            if (notifBtn) {
                notifBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showNotifications = !showNotifications;
                    render();
                });
            }

            // 关闭通知面板
            document.addEventListener('click', (e) => {
                if (showNotifications && !e.target.closest('#notification-panel') && !e.target.closest('#notification-btn')) {
                    showNotifications = false;
                    render();
                }
            });

            // 桌面搜索
            const desktopSearch = document.getElementById('desktop-search');
            if (desktopSearch) {
                desktopSearch.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && desktopSearch.value.trim()) {
                        alert('搜索功能开发中: ' + desktopSearch.value);
                    }
                });
            }

            // 移动搜索
            const mobileSearchInput = document.getElementById('mobile-search-input');
            if (mobileSearchInput) {
                mobileSearchInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && mobileSearchInput.value.trim()) {
                        alert('搜索功能开发中: ' + mobileSearchInput.value);
                        toggleMobileSearch();
                    }
                });
            }
        }

        // 暴露全局函数
        window.markAllAsRead = markAllAsRead;
        window.showRetrainMessage = showRetrainMessage;
        window.viewMessageDetail = viewMessageDetail;
        window.closeModal = closeModal;
        window.toggleMobileMenu = toggleMobileMenu;
        window.toggleMobileSearch = toggleMobileSearch;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            render();
        });

        window.onload = render;

        // 监听窗口大小变化
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                if (window.innerWidth >= 768) {
                    showMobileMenu = false;
                    showMobileSearch = false;
                    render();
                }
            }, 250);
        });
    })();
</script>
</body>
</html>
