        ];

        // ==================== 全局状态管理 ====================
        let currentPage = localStorage.getItem('currentPage') || '趋势总览';
        let showNotifications = false;
        let activeModal = null; // 'retrain' 或 message 对象

        // ==================== 交互函数 ====================
        
        // 标记单条消息为已读
        function markAsRead(messageId) {
            const message = trendPredictions.notifications.find(n => n.id === messageId);
            if (message) {
                message.read = true;
                render(); // 重新渲染
            }
        }

        // 标记全部为已读
        function markAllAsRead() {
            trendPredictions.notifications.forEach(n => n.read = true);
            render();
        }

        // 显示重新训练提示
        function showRetrainMessage() {
            activeModal = 'retrain';
            render();
        }

        // 关闭所有弹窗
        function closeModal() {
            activeModal = null;
            render();
        }

        // 查看消息详情
        function viewMessageDetail(message) {
            // 先标记为已读
            if (!message.read) {
                message.read = true;
            }
            activeModal = message;
            render();
        }

        // 切换页面
        function changePage(page) {
            currentPage = page;
            localStorage.setItem('currentPage', page);
            showNotifications = false;
            render();
        }

        // ==================== 渲染函数 ====================
        function render() {
            const root = document.getElementById('root');
            
            // 生成未读消息数
            const unreadCount = trendPredictions.notifications.filter(n => !n.read).length;

            // ========== 侧边栏导航 ==========

                        </a>

            // ========== 消息面板 ==========

            // ========== 弹窗渲染 ==========

                        <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
                            <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl animate-fadeIn">

                }

                    return `

                                            <span class="text-xs text-gray-400">${m.time}</span>

                                </div>

                                <div class="mt-6 flex space-x-3">

                                        查看详细分析
                                    </button>
                                    <button class="px-4 py-2 border border-gray-200 rounded-xl hover:bg-gray-50 transition-all" onclick="closeModal()">
                                        关闭
                                    </button>
                                </div>
                                ` : `
                                <div class="mt-6 flex justify-end">
                                    <button class="px-4 py-2 bg-gray-100 text-gray-700 rounded-xl hover:bg-gray-200 transition-all" onclick="closeModal()">
                                        关闭
                                    </button>
                                </div>
                                `}
                            </div>
                        </div>
                    `;
                }
                return '';
            };

            // ========== 趋势总览页面 ==========
            const trendOverviewPage = `
                <div class="flex-1 flex flex-col overflow-hidden bg-gray-50 relative">
                    ${header}
                    ${notificationPanel}
                    <main class="flex-1 overflow-y-auto p-8 custom-scroll">
                        <!-- 欢迎 + 预测横幅 -->
                        <div class="trend-gradient rounded-2xl p-8 text-white mb-8 shadow-xl">

            thinkingDiv.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50';
            thinkingDiv.innerHTML = `
                <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
                    <div class="flex items-center space-x-4 mb-4">
                        <div class="w-12 h-12 bg-gradient-to-r from-blue-500 to-purple-500 rounded-full flex items-center justify-center">
                            <span class="text-white text-xl font-bold">曦</span>
                        </div>
                        <div>
                            <h3 class="text-lg font-bold text-gray-900">灵曦AI · 思考中</h3>
                            <p class="text-sm text-gray-500">正在分析市场数据...</p>
                        </div>
                    </div>
                    <div class="mb-4 p-4 bg-gray-50 rounded-xl">
                        <p class="text-sm text-gray-700">"${question}"</p>
                    </div>
                    <div class="flex justify-center space-x-2">
                        <div class="w-3 h-3 bg-purple-500 rounded-full animate-bounce" style="animation-delay: 0s"></div>
                        <div class="w-3 h-3 bg-purple-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                        <div class="w-3 h-3 bg-purple-500 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
                    </div>
                </div>
            `;
            document.body.appendChild(thinkingDiv);
        }

        function showAIResponse(data) {
            const thinkingDiv = document.getElementById('ai-thinking');
            if (thinkingDiv) thinkingDiv.remove();
            
            const responseDiv = document.createElement('div');
            responseDiv.id = 'ai-response';
            responseDiv.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50';
            
            const answerText = data.answer || data.response || '暂无回答';
            const formattedAnswer = answerText.split('\n').map(line => {
                if (line.startsWith('-')) return `<li class="ml-4 text-gray-700">${line.substring(1)}</li>`;
                return line ? `<p class="text-gray-700 mb-2">${line}</p>` : '';
            }).join('');
            
            responseDiv.innerHTML = `
                <div class="bg-white rounded-2xl p-8 max-w-2xl w-full max-h-[80vh] overflow-y-auto shadow-2xl">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 bg-gradient-to-r from-blue-500 to-purple-500 rounded-full flex items-center justify-center">
                                <span class="text-white font-bold">曦</span>
                            </div>
                            <div>
                                <h3 class="text-lg font-bold text-gray-900">灵曦AI · 洞察</h3>
                                <span class="text-xs text-green-600">基于实时数据分析</span>
                            </div>
                        </div>
                        <button onclick="this.closest('#ai-response').remove()" class="text-gray-400 hover:text-gray-600">
                            <i class="fas fa-times text-xl"></i>
                        </button>
                    </div>
                    
                    <div class="prose max-w-none">
                        ${formattedAnswer}
                    </div>
                    
                    <div class="mt-6 pt-4 border-t border-gray-100">
                        <div class="flex items-center justify-between text-sm text-gray-500">
                            <span>置信度: ${data.confidence || '92%'}</span>
                            <span>数据来源: ${data.sources || '全网实时数据'}</span>
                            <span>分析耗时: ${data.time || '2.3s'}</span>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(responseDiv);
        }

        function showAIError(error) {
            const thinkingDiv = document.getElementById('ai-thinking');
            if (thinkingDiv) thinkingDiv.remove();
            alert('灵曦AI暂时无法响应，请稍后再试。');
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(initAISearch, 500);
        });

        window.onload = render;
        
        // 将函数暴露到全局
        window.markAllAsRead = markAllAsRead;
        window.showRetrainMessage = showRetrainMessage;
        window.viewMessageDetail = viewMessageDetail;
        window.closeModal = closeModal;
    })();
</script>
</body>
</html>
